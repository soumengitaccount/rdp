---
- name: Deploy RustDesk Remote Desktop on Windows 10
  hosts: windows_workstations
  gather_facts: false
  vars:
    # Update this version as needed for your deployment
    rustdesk_version: "1.3.0" 
    download_dir: "C:\\Temp"
    installer_name: "rustdesk-{{ rustdesk_version }}-x86_64.exe"

  tasks:
    - name: Create temporary download directory if it doesn't exist
      ansible.windows.win_file:
        path: "{{ download_dir }}"
        state: directory

    - name: Download the official RustDesk installer
      ansible.windows.win_get_url:
        url: "https://github.com/rustdesk/rustdesk/releases/download/{{ rustdesk_version }}/{{ installer_name }}"
        dest: "{{ download_dir }}\\{{ installer_name }}"
        timeout: 60

    - name: Run RustDesk silent installation
      ansible.windows.win_package:
        path: "{{ download_dir }}\\{{ installer_name }}"
        arguments: --silent-install
        state: present

    - name: Clean up the installer file to save space
      ansible.windows.win_file:
        path: "{{ download_dir }}\\{{ installer_name }}"
        state: absent